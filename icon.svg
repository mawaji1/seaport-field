<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1C7293"/>
      <stop offset="60%" stop-color="#0B2545"/>
      <stop offset="100%" stop-color="#06182E"/>
    </radialGradient>
  </defs>

  <!-- Background tile -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Six lane bars (mimicking the staging yard lane bundles), gold + teal alternating -->
  <g transform="translate(110 130)">
    <rect x="0"   y="0" width="40" height="252" rx="6" fill="#E5A823"/>
    <rect x="56"  y="0" width="40" height="252" rx="6" fill="#1C7293"/>
    <rect x="112" y="0" width="40" height="252" rx="6" fill="#E5A823"/>
    <rect x="168" y="0" width="40" height="252" rx="6" fill="#1C7293"/>
    <rect x="224" y="0" width="40" height="252" rx="6" fill="#E5A823"/>
    <rect x="280" y="0" width="40" height="252" rx="6" fill="#1C7293"/>
  </g>

  <!-- "You are here" pin overlay, centered low — the field-tracking metaphor -->
  <g transform="translate(256 380)">
    <!-- Glow ring -->
    <circle cx="0" cy="-110" r="56" fill="rgba(46,134,222,0.18)"/>
    <circle cx="0" cy="-110" r="34" fill="rgba(46,134,222,0.35)"/>
    <!-- Pin body -->
    <path d="M0 -160
             a 36 36 0 1 1 0.01 0
             l -1 0
             c 0 24 -18 44 -36 60
             c -18 -16 -36 -36 -36 -60
             a 36 36 0 0 1 36 -36
             z"
          transform="translate(0 -110) translate(0 -34) scale(0.8)"
          fill="#E5A823" stroke="#0B2545" stroke-width="6"/>
    <circle cx="0" cy="-115" r="11" fill="#0B2545"/>
  </g>
</svg>
